{{- if .Values.backendUser.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-user
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-user
spec:
  replicas: {{ .Values.backendUser.replicaCount }}
  selector:
    matchLabels:
      app: backend-user
  template:
    metadata:
      labels:
        app: backend-user
        {{- with .Values.common.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.common.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "ecommerce.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend-user
          image: "{{ .Values.backendUser.image.repository }}:{{ .Values.backendUser.image.tag }}"
          imagePullPolicy: {{ .Values.backendUser.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backendUser.containerPort }}
          env:
            - name: PORT
              value: {{ .Values.backendUser.env.PORT | quote }}
            - name: DB_HOST
              value: {{ .Values.backendUser.env.DB_HOST | quote }}
            - name: DB_PORT
              value: {{ .Values.backendUser.env.DB_PORT | quote }}
            - name: DB_NAME
              value: {{ .Values.backendUser.env.DB_NAME | quote }}
            - name: DB_USER
              value: {{ .Values.backendUser.env.DB_USER | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-user-secret
                  key: DB_PASSWORD
          resources:
            {{- toYaml .Values.backendUser.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend-user
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-user
spec:
  type: {{ .Values.backendUser.service.type }}
  selector:
    app: backend-user
  ports:
    - name: http
      port: {{ .Values.backendUser.service.port }}
      targetPort: {{ .Values.backendUser.service.targetPort }}
{{- end }}